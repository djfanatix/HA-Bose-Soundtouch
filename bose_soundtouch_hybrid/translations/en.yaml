configuration:
  app_ip:
    name: App IP address
    description: Local IP address of the Home Assistant host that Bose speakers can reach.
  app_port:
    name: App port
    description: Port used by SoundTouch Hybrid for the web UI and Bose cloud emulation.
  bose_port:
    name: Bose speaker port
    description: Local API port used by Bose SoundTouch hardware.
  music_assistant_addon:
    name: Music Assistant runs on this Home Assistant
    description: Use local Home Assistant defaults for Music Assistant and auto-detect the add-on container when possible.
  mass_ip:
    name: Music Assistant IP address
    description: Leave blank when Music Assistant runs as an app/add-on on the same Home Assistant host.
  mass_port:
    name: Music Assistant port
    description: Port used by Music Assistant.
  mass_username:
    name: Music Assistant username
    description: Username configured in Music Assistant.
  mass_password:
    name: Music Assistant password
    description: Password configured in Music Assistant.
  mass_addon_slug:
    name: Music Assistant app slug
    description: Optional override for Supervisor restart, for example music_assistant.
  wla_preset_bypass:
    name: Wireless Link preset bypass
    description: Route Wireless Link Adapter preset clicks directly to Music Assistant.
  auto_resume_preset:
    name: Auto resume preset
    description: Resume the last playing preset when a speaker powers back on.
  speakers:
    name: Speakers
    description: Bose SoundTouch speakers managed by this app.
    fields:
      name:
        name: Speaker name
        description: Friendly display name for the speaker.
      ip:
        name: Speaker IP address
        description: Static local IP address of the Bose SoundTouch speaker.
network:
  3010/TCP: "SoundTouch Hybrid web interface and Bose cloud emulation"
