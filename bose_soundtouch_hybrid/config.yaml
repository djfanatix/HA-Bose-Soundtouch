name: "Bose SoundTouch Hybrid"
version: "0.1.6"
slug: "bose_soundtouch_hybrid"
description: "Private cloud bridge for Bose SoundTouch speakers and Music Assistant"
url: "https://github.com/TJGigs/Bose-SoundTouch-Hybrid-2026"
arch:
  - aarch64
  - amd64
  - armv7
  - i386
startup: application
boot: auto
init: false
host_network: true
hassio_api: true
hassio_role: manager
ingress: true
ingress_port: 3010
ingress_entry: /control.html
ingress_stream: true
panel_icon: mdi:speaker
panel_title: SoundTouch Hybrid
ports:
  3010/tcp: 3010
ports_description:
  3010/tcp: "SoundTouch Hybrid web interface and Bose cloud emulation"
map:
  - addon_config:rw
options:
  app_ip: null
  app_port: 3010
  bose_port: 8090
  music_assistant_addon: true
  mass_ip: ""
  mass_port: 8095
  mass_username: ""
  mass_password: ""
  auto_resume_preset: true
  trust_proxy: false
  speakers: []
schema:
  app_ip: str
  app_port: int(1,65535)
  bose_port: int(1,65535)
  music_assistant_addon: bool
  mass_ip: str
  mass_port: int(1,65535)
  mass_username: str
  mass_password: password
  auto_resume_preset: bool
  trust_proxy: bool
  speakers:
    - name: str
      ip: str
