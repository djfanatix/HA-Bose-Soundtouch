name: "Bose SoundTouch Hybrid"
version: "3.5.5"
slug: "bose_soundtouch_hybrid"
description: "Private cloud bridge for Bose SoundTouch speakers and Music Assistant"
url: "https://github.com/TJGigs/Bose-SoundTouch-Hybrid-2026"
arch:
  - aarch64
  - amd64
  - armv7
  - i386
startup: application
boot: auto
init: false
host_network: true
hassio_api: true
hassio_role: manager
homeassistant_api: true
ingress: true
ingress_port: 3010
ingress_entry: /control.html
ingress_stream: true
panel_icon: mdi:speaker
panel_title: SoundTouch Hybrid
ports:
  3010/tcp: 3010
ports_description:
  3010/tcp: "SoundTouch Hybrid web interface and Bose cloud emulation"
map:
  - addon_config:rw
options:
  app_ip: ""
  app_port: 3010
  bose_port: 8090
  mass_ip: ""
  mass_port: 8095
  mass_token: ""
  mass_username: ""
  mass_password: ""
  auto_discover_speakers: true
  auto_resume_preset: true
  trust_proxy: false
  speakers: []
schema:
  app_ip: str?
  app_port: int(1,65535)
  bose_port: int(1,65535)
  mass_ip: str?
  mass_port: int(1,65535)
  mass_token: password?
  mass_username: str?
  mass_password: password?
  auto_discover_speakers: bool
  auto_resume_preset: bool
  trust_proxy: bool
  speakers:
    - name: str
      ip: str
